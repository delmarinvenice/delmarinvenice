<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" width="100%">
  <defs>
    <linearGradient id="quantum-glow" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E5A93C" stop-opacity="0.2"/>
      <stop offset="48%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="52%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="75%" stop-color="#E5A93C" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <g stroke="#E5A93C" stroke-opacity="0.08" stroke-width="0.5">
    <line x1="100" y1="0" x2="100" y2="360" />
    <line x1="200" y1="0" x2="200" y2="360" />
    <line x1="300" y1="0" x2="300" y2="360" />
    <line x1="500" y1="0" x2="500" y2="360" />
    <line x1="600" y1="0" x2="600" y2="360" />
    <line x1="700" y1="0" x2="700" y2="360" />
    <line x1="0" y1="180" x2="800" y2="180" />
  </g>

  <g transform="translate(400, 180)">
    <circle cx="0" cy="0" r="140" fill="none" stroke="url(#quantum-glow)" stroke-width="0.8" stroke-opacity="0.3" stroke-dasharray="2,6">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="40s" repeatCount="indefinite" additive="sum"/>
    </circle>
    <circle cx="0" cy="0" r="110" fill="none" stroke="#FFFFFF" stroke-width="1.2" stroke-opacity="0.5">
      <animate attributeName="stroke-opacity" values="0.2;0.8;0.2" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="80" fill="none" stroke="url(#quantum-glow)" stroke-width="1.5" stroke-opacity="0.7" stroke-dasharray="40,2">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="20s" repeatCount="indefinite" additive="sum"/>
    </circle>
    
    <line x1="-160" y1="0" x2="160" y2="0" stroke="#FFFFFF" stroke-width="0.5" stroke-opacity="0.4" />
    <line x1="0" y1="-160" x2="0" y2="160" stroke="#FFFFFF" stroke-width="0.5" stroke-opacity="0.4" />

    <path d="M-20,40 C-40,-10 -30,-70 0,-100 C30,-70 40,-10 20,40 C10,60 -10,60 -20,40 Z" stroke="url(#quantum-glow)" stroke-width="2.5" fill="none" stroke-opacity="0.9"/>
    <path d="M-10,20 C-25,-10 -20,-50 0,-75 C20,-50 25,-10 10,20 Z" stroke="#FFFFFF" stroke-width="0.8" fill="none" stroke-opacity="0.6"/>

    <path d="M-25,-10 Q-70,-30 -110,-10" stroke="url(#quantum-glow)" stroke-width="1" fill="none" stroke-opacity="0.6"/>
    <path d="M25,-10 Q70,-30 110,-10" stroke="url(#quantum-glow)" stroke-width="1" fill="none" stroke-opacity="0.6"/>
  </g>

  <line x1="400" y1="0" x2="400" y2="360" stroke="#FFFFFF" stroke-width="3" stroke-opacity="0.9">
    <animate attributeName="stroke-width" values="1.5;4;1.5" dur="2s" repeatCount="indefinite"/>
  </line>
  <line x1="400" y1="0" x2="400" y2="360" stroke="url(#quantum-glow)" stroke-width="8" stroke-opacity="0.4"/>

  <g transform="translate(400, 80)">
    <polygon points="0,-30 3,-3 30,0 3,3 0,30 -3,3 -30,0 -3,-3" fill="#FFFFFF">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.2s" repeatCount="indefinite"/>
    </polygon>
    <circle cx="0" cy="0" r="8" fill="#FFFFFF" fill-opacity="0.4">
      <animate attributeName="r" values="5;11;5" dur="1.2s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
