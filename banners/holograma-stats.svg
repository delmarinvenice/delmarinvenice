<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 160" width="100%">
  <defs>
    <linearGradient id="vector-lens" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E5A93C" stop-opacity="0"/>
      <stop offset="30%" stop-color="#E5A93C" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="70%" stop-color="#E5A93C" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#E5A93C" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <line x1="40" y1="80" x2="760" y2="80" stroke="url(#vector-lens)" stroke-width="1.2" />
  <line x1="40" y1="84" x2="760" y2="84" stroke="#FFFFFF" stroke-width="0.5" stroke-opacity="0.2" stroke-dasharray="2,4" />

  <g stroke="#FFFFFF" stroke-opacity="0.3" stroke-width="0.8">
    <line x1="200" y1="75" x2="200" y2="85" />
    <line x1="300" y1="77" x2="300" y2="83" />
    <line x1="500" y1="77" x2="500" y2="83" />
    <line x1="600" y1="75" x2="600" y2="85" />
  </g>

  <ellipse cx="400" cy="80" rx="280" ry="35" fill="none" stroke="url(#vector-lens)" stroke-width="1.5" stroke-opacity="0.7">
    <animate attributeName="ry" values="35;39;35" dur="4s" repeatCount="indefinite" />
    <animate attributeName="rx" values="280;283;280" dur="4s" repeatCount="indefinite" />
  </ellipse>
  <ellipse cx="400" cy="80" rx="275" ry="32" fill="none" stroke="#FFFFFF" stroke-width="0.5" stroke-opacity="0.2" stroke-dasharray="4,8" />

  <g transform="translate(120, 80)">
    <polygon points="0,-16 2,-2 16,0 2,2 0,16 -2,2 -16,0 -2,-2" fill="#FFFFFF">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.8s" repeatCount="indefinite"/>
    </polygon>
    <circle cx="0" cy="0" r="4" fill="#E5A93C" fill-opacity="0.6"/>
  </g>

  <g transform="translate(680, 80)">
    <polygon points="0,-16 2,-2 16,0 2,2 0,16 -2,2 -16,0 -2,-2" fill="#FFFFFF">
      <animate attributeName="opacity" values="1;0.3;1" dur="2.2s" repeatCount="indefinite"/>
    </polygon>
    <circle cx="0" cy="0" r="4" fill="#FFFFFF" fill-opacity="0.5"/>
  </g>

  <g font-family="monospace" font-size="9" fill="#FFFFFF" fill-opacity="0.6" style="letter-spacing: 1px;">
    <circle cx="230" cy="65" r="1.5" fill="#E5A93C" fill-opacity="0.8"/>
    <text x="242" y="68" fill="#FFF3D1">sys.resonance_active</text>
    
    <text x="450" y="108">- perception_ratio::3:17</text>
    <polygon points="615,102 620,105 615,108 610,105" fill="#E5A93C" fill-opacity="0.8">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/>
    </polygon>
  </g>
</svg>
